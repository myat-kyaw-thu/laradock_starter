name: laravel-dev

services:

  # ── PHP 8.4-FPM ───────────────────────────────────────────────
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: laravel_php
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      # Mount your Laravel project code (current directory = project root)
      - ./src:/var/www/html
      # Persist Composer cache so installs are fast after first run
      - composer_cache:/home/laravel/.composer
    environment:
      - APP_ENV=local
    env_file:
      - .env.docker
    networks:
      - laravel
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  # ── Nginx ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: laravel_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      # Same code mount so Nginx can serve static files directly
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - laravel
    depends_on:
      - php

  # ── MySQL 8.0 ─────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: laravel_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-laravel}
      MYSQL_USER: ${MYSQL_USER:-laravel}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    networks:
      - laravel
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── phpMyAdmin ────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: laravel_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
      UPLOAD_LIMIT: 50M
    networks:
      - laravel
    depends_on:
      mysql:
        condition: service_healthy

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: laravel_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - laravel

  # ── Mailpit (local email catcher) ────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: laravel_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP
    networks:
      - laravel

  # ── Node / Vite (frontend dev server with HMR) ───────────────
  node:
    image: node:22-alpine
    container_name: laravel_node
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      # Same code mount as PHP so Vite watches the same files
      - ./src:/var/www/html
      # Persist node_modules so npm install is fast after first run
      - node_modules:/var/www/html/node_modules
    ports:
      - "5173:5173"   # Vite dev server
    # VITE_HOST tells the Vite config which host to bind to inside Docker
    environment:
      - VITE_HOST=0.0.0.0
    command: sh -c "npm install && npm run dev"
    networks:
      - laravel
    profiles:
      # Only starts when you explicitly run: docker compose --profile frontend up
      # OR: make dev  (which passes the profile automatically)
      - frontend

  # ── Composer (one-off runner, not a long-running service) ─────
  composer:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: laravel_composer
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
      - composer_cache:/home/laravel/.composer
    entrypoint: ["composer"]
    networks:
      - laravel

# ── Networks ──────────────────────────────────────────────────────
networks:
  laravel:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  composer_cache:
    driver: local
  node_modules:
    driver: local
