name: laradoc-starter

services:

  # ── PHP 8.4-FPM ───────────────────────────────────────────────
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: laravel_php
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html                          # all projects live here
      - composer_cache:/home/laravel/.composer
    environment:
      - APP_ENV=local
    networks:
      - laravel
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  # ── Nginx ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: laravel_nginx
    restart: unless-stopped
    ports:
      - "80:80"          # default catch-all
      - "8080-8090:8080-8090"   # project ports (up to 10 projects)
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/conf.d:/etc/nginx/conf.d      # only conf.d/ loaded — template stays outside
    networks:
      - laravel
    depends_on:
      - php

  # ── MySQL 8.0 ─────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: laravel_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    networks:
      - laravel
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── phpMyAdmin ────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: laravel_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
      UPLOAD_LIMIT: 50M
    networks:
      - laravel
    depends_on:
      mysql:
        condition: service_healthy

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: laravel_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - laravel

  # ── Mailpit ───────────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:v1.21
    container_name: laravel_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - laravel

  # ── Composer (one-off runner) ─────────────────────────────────
  # No container_name — avoids conflict when run multiple times
  composer:
    image: composer:2.8
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
      - composer_cache:/tmp/composer
    environment:
      - COMPOSER_HOME=/tmp/composer
    entrypoint: ["composer"]
    networks:
      - laravel

  # ── Node / Vite (frontend — optional profile) ─────────────────
  node:
    image: node:22-alpine
    container_name: laravel_node
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
      - node_modules:/var/www/html/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_HOST=0.0.0.0
    command: sh -c "[ -d node_modules ] || npm install && npm run dev"
    networks:
      - laravel
    profiles:
      - frontend

# ── Networks ──────────────────────────────────────────────────────
networks:
  laravel:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────
volumes:
  mysql_data:
  redis_data:
  composer_cache:
  node_modules:
