# ── Default catch-all ─────────────────────────────────────────
# Shows a welcome page if no project is configured yet.
server {
    listen 80 default_server;
    server_name _;

    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;

    location / {
        return 200 '<html><body style="font-family:monospace;padding:2rem;background:#0d1117;color:#c9d1d9"><h2>&#128679; LaraDoc Starter</h2><p>No project configured yet.</p><p>Run: <code style="background:#161b22;padding:4px 8px;border-radius:4px">add-project.bat &lt;name&gt; &lt;port&gt;</code></p></body></html>';
        add_header Content-Type text/html;
    }
}
