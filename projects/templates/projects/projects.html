{% extends 'main.html' %} {% block content %}
<h1>Projects List</h1>

{% for project in projects %}
<div>
  <h2>{{ project.name }}</h2>
  <p>ID: {{ project.id }}</p>
  <p>Description: {{ project.description }}</p>
  <a href="{% url 'projectDetail' project.id %}">Go to details</a>
  <hr />
</div>
{% endfor %} {% endblock content %}
